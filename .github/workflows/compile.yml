name: 'Compile'
permissions: {}
on: [push, pull_request]
jobs:
  main:
    name: 'Compile'
    runs-on: ubuntu-latest
    steps:
      - name: 'Install'
        run: |
          sudo apt-get install emacs build-essential libffi-dev libltdl-dev
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 'Compile modules'
        run: |
          make modules
      - name: 'Compile lisp'
        run: |
          make lisp
      - name: 'Compile lisp (byte-compile-error-on-warn)'
        if: ${{ vars.byte_compile_error_on_warn != 'nil' }}
        env:
          COMPILE_ERROR_SETTINGS: ${{ vars.compile_error_settings }}
        run: |
          rm -rf *.elc
          make EMACS_ARGS="--eval '(progn \
          (setq byte-compile-error-on-warn t) \
          ${COMPILE_ERROR_SETTINGS})'" lisp
      - name: 'Test'
        run: |
          make test
